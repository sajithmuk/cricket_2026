<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Hub - Fixtures & Results</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hide scrollbar for horizontal scrolling on mobile */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Clean transitions */
        .fade-in { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 font-sans pb-20 text-slate-900">

    <!-- ECB Style Navy Header -->
    <header class="bg-[#001427] text-white sticky top-0 z-20 shadow-md">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-[#00A0D6] p-1.5 rounded-sm">
                    <i data-lucide="trophy" class="text-white w-5 h-5"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight uppercase">Team Hub <span class="text-[#00A0D6] font-normal mx-1">|</span> 2026</h1>
            </div>
        </div>
    </header>

    <!-- Professional Navigation Bar -->
    <div class="bg-white border-b border-slate-200 sticky top-16 z-10 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 flex space-x-8">
            <button onclick="switchTab('upcoming')" id="tab-upcoming" class="py-4 text-sm font-bold uppercase tracking-wider border-b-4 transition-colors border-[#00A0D6] text-[#001427]">
                Upcoming (<span id="count-upcoming">0</span>)
            </button>
            <button onclick="switchTab('results')" id="tab-results" class="py-4 text-sm font-bold uppercase tracking-wider border-b-4 transition-colors border-transparent text-slate-500 hover:text-[#001427]">
                Results (<span id="count-results">0</span>)
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 py-6">
        
        <!-- Filter Controls (Clean Pills) -->
        <div class="mb-6 overflow-x-auto hide-scrollbar -mx-4 px-4 sm:mx-0 sm:px-0">
            <div class="flex items-center space-x-3 mb-3">
                <i data-lucide="filter" class="w-4 h-4 text-slate-400"></i>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Filter Division</span>
            </div>
            <div id="division-filters" class="flex flex-nowrap sm:flex-wrap gap-2 w-max sm:w-auto">
                <!-- Buttons populated dynamically -->
            </div>
        </div>

        <!-- Upcoming Container -->
        <div id="upcoming-container" class="space-y-4 block"></div>

        <!-- Results Container -->
        <div id="results-container" class="space-y-4 hidden"></div>
    </main>

    <!-- Clinical Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-[#001427]/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-lg shadow-2xl fade-in rounded-md overflow-hidden">
            <!-- Modal Header -->
            <div class="bg-slate-100 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                <h2 class="text-lg font-bold text-[#001427] uppercase tracking-wide">Update Match Result</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <form id="result-form" class="p-6">
                <input type="hidden" id="modal-fixture-id">
                
                <div class="mb-6">
                    <p class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-1" id="modal-details"></p>
                    <p class="text-xl font-black text-[#001427]" id="modal-opponent"></p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Outcome</label>
                        <div class="grid grid-cols-3 gap-0 border border-slate-300 rounded-md overflow-hidden">
                            <button type="button" onclick="setOutcome('Won')" id="btn-Won" class="outcome-btn py-3 text-sm font-bold border-r border-slate-300 transition-colors">WON</button>
                            <button type="button" onclick="setOutcome('Lost')" id="btn-Lost" class="outcome-btn py-3 text-sm font-bold border-r border-slate-300 transition-colors">LOST</button>
                            <button type="button" onclick="setOutcome('Draw')" id="btn-Draw" class="outcome-btn py-3 text-sm font-bold transition-colors">DRAW</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Score & Notes <span class="font-normal normal-case text-slate-400">(Optional)</span></label>
                        <input type="text" id="modal-notes" placeholder="e.g. Won by 5 wickets, 120/4" class="w-full px-4 py-3 bg-white border border-slate-300 focus:outline-none focus:border-[#00A0D6] focus:ring-1 focus:ring-[#00A0D6] rounded-sm transition-all text-sm">
                    </div>
                </div>

                <div class="mt-8">
                    <button type="submit" class="w-full bg-[#00A0D6] hover:bg-[#0089b8] text-white font-bold uppercase tracking-widest py-4 px-4 rounded-sm transition-colors">
                        Save Result
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        const initialFixtures = [
            // Under 11 Haydn Davies Foster
            { id: 'u11-1', date: "03/05/2026", time: "09:30", division: "U11 Haydn Davies Foster", home: "Memorial Park Cricket Academy", away: "Goresbrook CC" },
            { id: 'u11-2', date: "10/05/2026", time: "09:30", division: "U11 Haydn Davies Foster", home: "Newham CC", away: "Memorial Park Cricket Academy" },
            { id: 'u11-3', date: "05/07/2026", time: "09:30", division: "U11 Haydn Davies Foster", home: "Memorial Park Cricket Academy", away: "Aztecs CC, Ilford B" },
            { id: 'u11-4', date: "12/07/2026", time: "09:30", division: "U11 Haydn Davies Foster", home: "Ekota Academy", away: "Memorial Park Cricket Academy" },
            { id: 'u11-5', date: "26/07/2026", time: "09:30", division: "U11 Haydn Davies Foster", home: "Memorial Park Cricket Academy", away: "South Loughton CC" },
            { id: 'u11-6', date: "02/08/2026", time: "09:30", division: "U11 Haydn Davies Foster", home: "Fives and Heronians CC B", away: "Memorial Park Cricket Academy" },
            
            // Under 9 Don Coates Grp 3
            { id: 'u9dc-1', date: "10/05/2026", time: "09:30", division: "U9 Don Coates Grp 3", home: "South Woodford CC - South Woodford & Memorial Park CA", away: "Aztecs CC, Ilford - Under 9 - DC" },
            { id: 'u9dc-2', date: "17/05/2026", time: "09:30", division: "U9 Don Coates Grp 3", home: "Frenford CC - Under 9 - DC B", away: "South Woodford CC - South Woodford & Memorial Park CA" },
            { id: 'u9dc-3', date: "24/05/2026", time: "09:30", division: "U9 Don Coates Grp 3", home: "South Woodford CC - South Woodford & Memorial Park CA", away: "Buckhurst Hill CC - Under 9 B" },
            { id: 'u9dc-4', date: "31/05/2026", time: "09:30", division: "U9 Don Coates Grp 3", home: "Walthamstow CC - Under 9 - DC", away: "South Woodford CC - South Woodford & Memorial Park CA" },
            { id: 'u9dc-5', date: "28/06/2026", time: "09:30", division: "U9 Don Coates Grp 3", home: "South Woodford CC - South Woodford & Memorial Park CA", away: "Woodford Wells CC - Under 9 - DC B" },
            { id: 'u9dc-6', date: "12/07/2026", time: "09:30", division: "U9 Don Coates Grp 3", home: "Woodford Green CC - Under 9 - DC", away: "South Woodford CC - South Woodford & Memorial Park CA" },
            
            // Under 9 Freddie Goldman Grp 1
            { id: 'u9fg-1', date: "07/06/2026", time: "09:30", division: "U9 Freddie Goldman Grp 1", home: "Woodford Wells CC - Under 9", away: "South Woodford CC - South Woodford & Memorial Park CA" },
            { id: 'u9fg-2', date: "14/06/2026", time: "09:30", division: "U9 Freddie Goldman Grp 1", home: "South Woodford CC - South Woodford & Memorial Park CA", away: "Leyton Wicketz CC - Under 9" },
            { id: 'u9fg-3', date: "05/07/2026", time: "09:30", division: "U9 Freddie Goldman Grp 1", home: "Wanstead & Snaresbrook CC - Under 9 - Hardball A", away: "South Woodford CC - South Woodford & Memorial Park CA" },
            { id: 'u9fg-4', date: "19/07/2026", time: "09:30", division: "U9 Freddie Goldman Grp 1", home: "South Woodford CC - South Woodford & Memorial Park CA", away: "Ilford CC - Under 9" },
            { id: 'u9fg-5', date: "26/07/2026", time: "09:30", division: "U9 Freddie Goldman Grp 1", home: "Bancroft Lions CC - Under 9 - Hardball", away: "South Woodford CC - South Woodford & Memorial Park CA" },

            // NEW: Under 11 Keith Hurst Grp 1
            { id: 'u11kh-1', date: "24/05/2026", time: "09:30", division: "U11 Keith Hurst Grp 1", home: "Memorial Park Cricket Academy - Under 11 Softball", away: "Avengers CC - Under 11 Softball" },
            { id: 'u11kh-2', date: "31/05/2026", time: "09:30", division: "U11 Keith Hurst Grp 1", home: "Memorial Park Cricket Academy - Under 11 Softball", away: "Frenford CC - Under 11 Softball" },
            { id: 'u11kh-3', date: "07/06/2026", time: "09:30", division: "U11 Keith Hurst Grp 1", home: "Memorial Park Cricket Academy - Under 11 Softball", away: "West Ham CC - Under 11 Softball" },
            { id: 'u11kh-4', date: "14/06/2026", time: "09:30", division: "U11 Keith Hurst Grp 1", home: "Bancroft Lions CC - Under 11 Softball", away: "Memorial Park Cricket Academy - Under 11 Softball" },
            { id: 'u11kh-5', date: "28/06/2026", time: "09:30", division: "U11 Keith Hurst Grp 1", home: "Memorial Park Cricket Academy - Under 11 Softball", away: "South Woodford CC - Under 11 Softball" },
            { id: 'u11kh-6', date: "19/07/2026", time: "09:30", division: "U11 Keith Hurst Grp 1", home: "Walthamstow CC - Under 11 Softball", away: "Memorial Park Cricket Academy - Under 11 Softball" }
        ];

        let results = JSON.parse(localStorage.getItem('cricketAppResults')) || {};
        let currentOutcome = 'Won';
        let activeTab = 'upcoming';
        let currentDivisionFilter = 'All';

        const parseDate = (dateStr) => {
            const [d, m, y] = dateStr.split('/');
            return new Date(y, m - 1, d);
        };

        const formatDateBlock = (dateStr) => {
            const date = parseDate(dateStr);
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            return {
                dayName: days[date.getDay()],
                dayNum: dateStr.split('/')[0],
                month: months[date.getMonth()]
            };
        };

        const getMatchDetails = (fixture) => {
            const isOurHome = fixture.home.includes("Memorial Park");
            const opponent = isOurHome ? fixture.away : fixture.home;
            // Clean up all the various suffixes to keep the opponent names looking pristine
            const cleanOpponent = opponent
                .replace(" - Under 9", "")
                .replace(" - DC", "")
                .replace(" - Under 11 Softball", "")
                .trim();
                
            return {
                opponent: cleanOpponent,
                isHome: isOurHome,
                locationType: isOurHome ? 'HOME' : 'AWAY'
            };
        };

        function renderFilters() {
            const filterContainer = document.getElementById('division-filters');
            const uniqueDivisions = ['All', ...new Set(initialFixtures.map(f => f.division))];
            
            filterContainer.innerHTML = uniqueDivisions.map(division => {
                const isActive = currentDivisionFilter === division;
                
                const activeClasses = "bg-[#001427] text-white border-[#001427]";
                const inactiveClasses = "bg-white text-slate-600 border-slate-300 hover:border-[#001427] hover:text-[#001427]";
                
                const label = division === 'All' ? 'ALL DIVISIONS' : division;
                
                return `
                    <button 
                        onclick="filterDivision('${division}')" 
                        class="px-4 py-2 rounded-sm text-xs font-bold uppercase tracking-wider border transition-colors whitespace-nowrap ${isActive ? activeClasses : inactiveClasses}"
                    >
                        ${label}
                    </button>
                `;
            }).join('');
        }

        function filterDivision(divisionValue) {
            currentDivisionFilter = divisionValue;
            renderFilters(); 
            renderFixtures();
        }

        function switchTab(tab) {
            activeTab = tab;
            
            const activeClass = "py-4 text-sm font-bold uppercase tracking-wider border-b-4 transition-colors border-[#00A0D6] text-[#001427]";
            const inactiveClass = "py-4 text-sm font-bold uppercase tracking-wider border-b-4 transition-colors border-transparent text-slate-500 hover:text-[#001427]";

            document.getElementById('tab-upcoming').className = tab === 'upcoming' ? activeClass : inactiveClass;
            document.getElementById('tab-results').className = tab === 'results' ? activeClass : inactiveClass;
            
            document.getElementById('upcoming-container').classList.toggle('hidden', tab !== 'upcoming');
            document.getElementById('upcoming-container').classList.toggle('block', tab === 'upcoming');
            document.getElementById('results-container').classList.toggle('hidden', tab !== 'results');
            document.getElementById('results-container').classList.toggle('block', tab === 'results');
        }

        function renderFixtures() {
            const upcomingContainer = document.getElementById('upcoming-container');
            const resultsContainer = document.getElementById('results-container');
            
            let upcomingFixtures = [];
            let pastFixtures = [];
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            initialFixtures.forEach(fixture => {
                if (currentDivisionFilter !== 'All' && fixture.division !== currentDivisionFilter) return;

                const fixtureDate = parseDate(fixture.date);
                if (fixtureDate >= today && !results[fixture.id]) {
                    upcomingFixtures.push(fixture);
                } else {
                    pastFixtures.push(fixture);
                }
            });

            upcomingFixtures.sort((a, b) => parseDate(a.date) - parseDate(b.date));
            pastFixtures.sort((a, b) => parseDate(b.date) - parseDate(a.date));

            document.getElementById('count-upcoming').innerText = upcomingFixtures.length;
            document.getElementById('count-results').innerText = pastFixtures.length;

            const emptyStateHTML = (text) => `
                <div class="text-center py-16 bg-white border border-slate-200 rounded-sm">
                    <h3 class="text-slate-400 font-bold uppercase tracking-widest">${text}</h3>
                </div>`;

            upcomingContainer.innerHTML = upcomingFixtures.length === 0 ? emptyStateHTML('No upcoming matches') : upcomingFixtures.map(f => createCardHTML(f)).join('');
            resultsContainer.innerHTML = pastFixtures.length === 0 ? emptyStateHTML('No results found') : pastFixtures.map(f => createCardHTML(f)).join('');

            lucide.createIcons();
        }

        function createCardHTML(fixture) {
            const details = getMatchDetails(fixture);
            const result = results[fixture.id];
            const dateBlock = formatDateBlock(fixture.date);
            
            const borderAccent = details.isHome ? 'border-l-[#00A0D6]' : 'border-l-slate-400';

            let resultHTML = '';
            if (result) {
                const colorClass = result.outcome === 'Won' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' :
                                   result.outcome === 'Lost' ? 'bg-rose-50 text-rose-700 border-rose-200' :
                                   'bg-amber-50 text-amber-700 border-amber-200';
                
                resultHTML = `
                    <div class="mt-4 p-3 border ${colorClass} flex flex-col sm:flex-row sm:items-center sm:justify-between rounded-sm">
                        <span class="font-bold uppercase tracking-wider text-sm mb-1 sm:mb-0">Match ${result.outcome}</span>
                        ${result.notes ? `<span class="text-sm font-medium opacity-90">${result.notes}</span>` : ''}
                    </div>
                `;
            }

            return `
                <div class="bg-white border border-slate-200 border-l-4 ${borderAccent} flex flex-col md:flex-row rounded-sm shadow-sm hover:shadow-md transition-shadow">
                    
                    <!-- Clinical Date Block (ECB Style) -->
                    <div class="p-4 bg-slate-50 border-b md:border-b-0 md:border-r border-slate-200 flex flex-row md:flex-col items-center justify-center md:w-28 shrink-0">
                        <span class="text-xs text-slate-500 font-bold uppercase tracking-widest mr-2 md:mr-0">${dateBlock.dayName}</span>
                        <span class="text-3xl font-black text-[#001427] leading-none my-1">${dateBlock.dayNum}</span>
                        <span class="text-xs text-slate-500 font-bold uppercase tracking-widest ml-2 md:ml-0">${dateBlock.month}</span>
                    </div>

                    <!-- Match Details -->
                    <div class="p-5 flex-1 flex flex-col justify-center">
                        <div class="flex flex-wrap gap-2 items-center mb-2">
                            <span class="px-2 py-0.5 text-[10px] font-bold uppercase tracking-widest bg-slate-100 text-slate-600 rounded-sm border border-slate-200">
                                ${fixture.division}
                            </span>
                            <span class="px-2 py-0.5 text-[10px] font-bold uppercase tracking-widest ${details.isHome ? 'bg-[#001427] text-white' : 'bg-slate-200 text-slate-700'} rounded-sm">
                                ${details.locationType}
                            </span>
                            <span class="flex items-center text-xs font-bold text-slate-500 ml-auto">
                                <i data-lucide="clock" class="mr-1 w-3 h-3"></i> ${fixture.time}
                            </span>
                        </div>
                        
                        <div class="flex items-center mt-1">
                            <span class="text-sm font-bold text-slate-400 mr-3 uppercase">VS</span>
                            <h3 class="text-xl font-black text-[#001427] uppercase tracking-wide">
                                ${details.opponent}
                            </h3>
                        </div>

                        ${resultHTML}
                    </div>
                    
                    <!-- Action Button Area -->
                    <div class="p-4 bg-slate-50 border-t md:border-t-0 md:border-l border-slate-200 flex items-center justify-center md:w-40 shrink-0">
                        <button onclick="openModal('${fixture.id}')" class="w-full px-4 py-2 bg-white border border-[#00A0D6] text-[#00A0D6] hover:bg-[#00A0D6] hover:text-white text-xs font-bold uppercase tracking-widest rounded-sm transition-colors flex items-center justify-center">
                            ${result ? 'Edit Result' : 'Update'}
                        </button>
                    </div>
                </div>
            `;
        }

        /* --- Modal Logic --- */
        function openModal(fixtureId) {
            const fixture = initialFixtures.find(f => f.id === fixtureId);
            const details = getMatchDetails(fixture);
            const existingResult = results[fixtureId];

            document.getElementById('modal-fixture-id').value = fixtureId;
            document.getElementById('modal-opponent').innerText = `VS ${details.opponent}`;
            document.getElementById('modal-details').innerText = `${fixture.date} • ${fixture.division}`;
            
            setOutcome(existingResult ? existingResult.outcome : 'Won');
            document.getElementById('modal-notes').value = existingResult ? existingResult.notes : '';

            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function setOutcome(outcome) {
            currentOutcome = outcome;
            
            const baseClass = "outcome-btn py-3 text-sm font-bold uppercase tracking-widest transition-colors ";
            
            const styles = {
                'Won': outcome === 'Won' ? 'bg-[#001427] text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-100',
                'Lost': outcome === 'Lost' ? 'bg-[#001427] text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-100',
                'Draw': outcome === 'Draw' ? 'bg-[#001427] text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-100',
            };

            ['Won', 'Lost', 'Draw'].forEach(o => {
                const btn = document.getElementById(`btn-${o}`);
                // Re-apply border-r to the first two buttons so the grid looks like a segmented control
                let borderClass = o !== 'Draw' ? 'border-r border-slate-300 ' : '';
                btn.className = baseClass + borderClass + styles[o];
            });
        }

        document.getElementById('result-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('modal-fixture-id').value;
            const notes = document.getElementById('modal-notes').value;
            
            results[id] = { outcome: currentOutcome, notes: notes };
            localStorage.setItem('cricketAppResults', JSON.stringify(results));
            
            closeModal();
            renderFixtures();
        });

        // Initialize App
        renderFilters();
        renderFixtures();
        
    </script>
</body>
</html>
